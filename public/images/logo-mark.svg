<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer plate ring -->
  <circle cx="20" cy="20" r="18" stroke="#4A7C6F" stroke-width="2"/>
  <!-- Inner plate ring (dashed) -->
  <circle cx="20" cy="20" r="12" stroke="#4A7C6F" stroke-width="1.5" stroke-dasharray="3.5 2.5"/>
  <!-- Fork tines -->
  <line x1="15" y1="9"  x2="15" y2="17" stroke="#4A7C6F" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="17.5" y1="9"  x2="17.5" y2="17" stroke="#4A7C6F" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="20" y1="9"  x2="20" y2="17" stroke="#4A7C6F" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Fork handle -->
  <line x1="17.5" y1="17" x2="17.5" y2="31" stroke="#4A7C6F" stroke-width="1.75" stroke-linecap="round"/>
</svg>
